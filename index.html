<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HeoPlay</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       INTRO SCREEN
  ═══════════════════════════════════════════ -->
  <div id="intro-screen">
    <canvas id="intro-canvas"></canvas>

    <!-- Vertical red light lines -->
    <div class="light-lines">
      <div class="light-line" style="--delay:0s; --x:12%"></div>
      <div class="light-line" style="--delay:0.3s; --x:28%"></div>
      <div class="light-line" style="--delay:0.15s; --x:44%"></div>
      <div class="light-line" style="--delay:0.45s; --x:58%"></div>
      <div class="light-line" style="--delay:0.08s; --x:72%"></div>
      <div class="light-line" style="--delay:0.6s; --x:87%"></div>
    </div>

    <!-- Logo -->
    <div class="intro-logo-wrap">

      <div class="intro-logo" id="intro-logo">
        <span class="heo-red">Heo</span><span class="play-white">Play</span>
      </div>

      <div class="intro-tagline" id="intro-tagline">
        PREMIUM CINEMA
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN APP
  ═══════════════════════════════════════════ -->
  <div id="app" class="hidden">

    <!-- Header -->
    <header class="app-header">

      <div class="header-logo">
        <span class="heo-red">Heo</span><span class="play-white">Play</span>
      </div>

      <div class="header-dot"></div>

    </header>

    <!-- Choose Screen -->
    <main class="choose-screen">

      <div class="choose-label">
        <span class="choose-line"></span>

        <span class="choose-text">
          CHOOSE YOUR EXPERIENCE
        </span>

        <span class="choose-line"></span>
      </div>

      <div class="album-grid" id="album-grid">
        <!-- Cards injected by JS -->
      </div>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <span>6 EXPERIENCES AVAILABLE</span>
    </footer>

  </div>

  <!-- ═══════════════════════════════════════════
       VIDEO OVERLAY
  ═══════════════════════════════════════════ -->
  <div id="video-overlay" class="hidden">

    <video id="main-video" playsinline></video>

    <!-- Controls -->
    <div class="video-ui" id="video-ui">

      <button class="close-btn" id="close-btn" aria-label="Close">

        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M2 2L18 18M18 2L2 18"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"/>
        </svg>

      </button>

      <div class="video-title-wrap" id="video-title-wrap">

        <div class="video-now-playing">
          NOW PLAYING
        </div>

        <div class="video-title" id="video-title"></div>

      </div>

      <div class="video-controls" id="video-controls">

        <button class="ctrl-btn"
        id="play-pause-btn"
        aria-label="Play/Pause">

          <svg id="play-icon"
          width="28"
          height="28"
          viewBox="0 0 28 28"
          fill="none">

            <polygon points="6,2 24,14 6,26"
            fill="white"/>

          </svg>

          <svg id="pause-icon"
          width="28"
          height="28"
          viewBox="0 0 28 28"
          fill="none"
          style="display:none">

            <rect x="5"
            y="2"
            width="6"
            height="24"
            rx="2"
            fill="white"/>

            <rect x="17"
            y="2"
            width="6"
            height="24"
            rx="2"
            fill="white"/>

          </svg>

        </button>

        <div class="progress-wrap" id="progress-wrap">

          <div class="progress-bar-bg">

            <div class="progress-bar-fill"
            id="progress-fill"></div>

            <div class="progress-thumb"
            id="progress-thumb"></div>

          </div>

          <div class="time-display">

            <span id="current-time">0:00</span>

            <span id="total-time">0:00</span>

          </div>

        </div>

        <button class="ctrl-btn"
        id="fullscreen-btn"
        aria-label="Fullscreen">

          <svg width="22"
          height="22"
          viewBox="0 0 22 22"
          fill="none">

            <path d="M2 8V2H8M14 2H20V8M20 14V20H14M8 20H2V14"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"/>

          </svg>

        </button>

      </div>

    </div>

    <!-- Vignette overlay -->
    <div class="video-vignette"></div>

  </div>

  <script src="index.js"></script>
</body>
</html>
